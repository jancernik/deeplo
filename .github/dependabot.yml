version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 2
    commit-message:
      prefix: "build"
      include: "scope"
    groups:
      go-modules:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 2
    commit-message:
      prefix: "build"
      include: "scope"
    groups:
      website:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
      include: "scope"
