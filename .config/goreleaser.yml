version: 2

project_name: deeplo

before:
  hooks:
    - go mod tidy

builds:
  - id: deeplo
    main: ./cmd/deeplo
    binary: deeplo
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/jancernik/deeplo/internal/build.Version={{.Version}}
    goos:
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - formats: [binary]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs(\(.+\))?:'
      - '^test(\(.+\))?:'
      - '^ci(\(.+\))?:'
      - '^build(\(.+\))?:'
      - '^chore(\(.+\))?:'
      - '^refactor(\(.+\))?:'
      - '^Merge '
      - '^Revert '
  groups:
    - title: Features
      regexp: '^feat(\(.+\))?!?:'
      order: 0
    - title: Bug fixes
      regexp: '^fix(\(.+\))?!?:'
      order: 1
    - title: Performance
      regexp: '^perf(\(.+\))?!?:'
      order: 2
    - title: Other changes
      order: 999

release:
  footer: |
    {{ if .PreviousTag }}**Full Changelog**: https://github.com/{{ .Env.GITHUB_REPOSITORY }}/compare/{{ .PreviousTag }}...{{ .Tag }}{{ end }}
